  </g>

  <!-- Wordmark on dark -->
  <text x="70" y="30" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="21" fill="#FFFFFF" letter-spacing="-0.3">Growth</text>
  <text x="70" y="55" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="21" fill="#38BDF8" letter-spacing="-0.3">Masala</text>
