<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1D4ED8"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Icon: bar chart + arrow -->
  <g transform="translate(4, 6)">
    <!-- Bars -->
    <rect x="0"  y="38" width="8" height="14" rx="2" fill="url(#iconGrad)" opacity="0.7"/>
    <rect x="11" y="30" width="8" height="22" rx="2" fill="url(#iconGrad)" opacity="0.8"/>
    <rect x="22" y="20" width="8" height="32" rx="2" fill="url(#iconGrad)" opacity="0.9"/>
    <rect x="33" y="10" width="8" height="42" rx="2" fill="url(#iconGrad)"/>
    <!-- Curved upward arrow -->
    <path d="M4 46 Q20 20 44 6" stroke="url(#arrowGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Arrowhead -->
    <polygon points="44,6 36,8 42,14" fill="#38BDF8"/>
  </g>

  <!-- Wordmark -->
  <text x="64" y="32" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="22" fill="#0F172A" letter-spacing="-0.3">Growth</text>
  <text x="64" y="57" font-family="Poppins, Arial, sans-serif" font-weight="700" font-size="22" fill="#2563EB" letter-spacing="-0.3">Masala</text>
</svg>
